stages: [validate, build, plan, deploy]

variables:
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"
  AWS_DEFAULT_REGION: "eu-central-1"

validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.8
    entrypoint: [""]
  script:
    - terraform -chdir=infra init -backend=false
    - terraform -chdir=infra validate

build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - IMAGE="$CI_REGISTRY_IMAGE/car-service"
    - docker build -t "$IMAGE:latest" -f car-service/Dockerfile .
    - docker tag "$IMAGE:latest" "$IMAGE:${CI_COMMIT_SHA}"
    - docker push "$IMAGE:latest"
    - docker push "$IMAGE:${CI_COMMIT_SHA}"
  artifacts:
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH

plan:
  stage: plan
  image:
    name: hashicorp/terraform:1.8
    entrypoint: [""]
  script:
    - cd infra
    - export AWS_ACCESS_KEY_ID=demo AWS_SECRET_ACCESS_KEY=demo AWS_EC2_METADATA_DISABLED=true
    - terraform init -backend=false -upgrade
    - terraform plan -refresh=false -out=tfplan.out
    - terraform show -no-color tfplan.out > tfplan.txt
  artifacts:
    paths:
      - infra/tfplan.out
      - infra/tfplan.txt
    expire_in: 1 week