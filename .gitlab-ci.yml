stages: [validate, build, plan]

variables:
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"
  AWS_DEFAULT_REGION: "eu-central-1"

validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.8
    entrypoint: [""]
  script:
    - cd infra
    - rm -rf .terraform/modules
    - terraform init -backend=false -upgrade -reconfigure
    - terraform validate

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: ["/busybox/sh","-c"]
  variables:
    DOCKER_CONFIG: /kaniko/.docker/
    IMAGE_NAME: car-service
  script: |
    set -eu

    mkdir -p /kaniko/.docker

    if [ -n "${CI_REGISTRY_IMAGE:-}" ]; then
      REG="$CI_REGISTRY"
      IMAGE="$CI_REGISTRY_IMAGE/$IMAGE_NAME"
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}\n' \
        "$REG" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" \
        > /kaniko/.docker/config.json
    else
      if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
        echo "CI_REGISTRY_IMAGE is empty and DOCKERHUB_* not set."
        echo "Enable GitLab Container Registry or set DOCKERHUB_USERNAME/DOCKERHUB_TOKEN." >&2
        exit 1
      fi
      REG="https://index.docker.io/v1/"
      IMAGE="index.docker.io/${DOCKERHUB_USERNAME}/${IMAGE_NAME}"
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}\n' \
        "$REG" "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" \
        > /kaniko/.docker/config.json
    fi

    /kaniko/executor \
      --context "$CI_PROJECT_DIR" \
      --dockerfile "$CI_PROJECT_DIR/car-service/Dockerfile" \
      --destination "$IMAGE:latest" \
      --destination "$IMAGE:${CI_COMMIT_SHA}"
  artifacts:
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH

plan:
  stage: plan
  image:
    name: hashicorp/terraform:1.8
    entrypoint: [""]
  script:
    - cd infra
    - rm -rf .terraform/modules
    - export AWS_ACCESS_KEY_ID=demo AWS_SECRET_ACCESS_KEY=demo AWS_EC2_METADATA_DISABLED=true
    - terraform init -backend=false -upgrade -reconfigure
    - terraform plan -refresh=false -out=tfplan.out
    - terraform show -no-color tfplan.out > tfplan.txt
  artifacts:
    paths:
      - infra/tfplan.out
      - infra/tfplan.txt
    expire_in: 1 week