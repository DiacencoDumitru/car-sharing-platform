stages: [verify, package, docker]

image: maven:3.9-eclipse-temurin-21

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository -Xmx1024m -XX:MaxRAMPercentage=70 -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress"

cache:
  key:
    files: [pom.xml]
    prefix: "maven-${CI_COMMIT_REF_SLUG}"
  paths:
    - .m2/repository/

verify:
  stage: verify
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests=false -T 1 verify
  artifacts:
    when: always
    reports:
      junit: "**/target/surefire-reports/TEST-*.xml"

package:
  stage: package
  needs: ["verify"]
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    when: on_success
    paths:
      - "**/target/*.jar"

docker-build-demo:
  stage: docker
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  rules:
    - if: '$ENABLE_DOCKER == "true"'
  script:
    - docker version
    - docker build -t demo/api-gateway:ci -f api-gateway/Dockerfile .
    - docker build -t demo/user-service:ci -f user-service/Dockerfile .
    - docker images | grep demo || true