variables:
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  LOCATION: "europe-central2"
  PROJECT:  "$GCP_PROJECT_ID"
  REPOSITORY: "microservices"
  AR_BASE: "$LOCATION-docker.pkg.dev/$PROJECT/$REPOSITORY"
  TF_DIR: "infra/terraform"

stages:
  - build
  - push-ar
  - deploy

.build-template:
  stage: build
  image: docker:24-git
  services: [ "docker:24-dind" ]
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -f ${DOCKERFILE_PATH} -t $CI_REGISTRY_IMAGE/${SERVICE_NAME}:$IMAGE_TAG .
    - docker push $CI_REGISTRY_IMAGE/${SERVICE_NAME}:$IMAGE_TAG
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build:eureka:
  extends: .build-template
  variables:
    SERVICE_NAME: "eureka-server"
    DOCKERFILE_PATH: "eureka-server/Dockerfile"

build:api-gateway:
  extends: .build-template
  variables:
    SERVICE_NAME: "api-gateway"
    DOCKERFILE_PATH: "api-gateway/Dockerfile"

build:user-service:
  extends: .build-template
  variables:
    SERVICE_NAME: "user-service"
    DOCKERFILE_PATH: "user-service/Dockerfile"

build:car-service:
  extends: .build-template
  variables:
    SERVICE_NAME: "car-service"
    DOCKERFILE_PATH: "car-service/Dockerfile"

build:booking-service:
  extends: .build-template
  variables:
    SERVICE_NAME: "booking-service"
    DOCKERFILE_PATH: "booking-service/Dockerfile"

build:dispute-service:
  extends: .build-template
  variables:
    SERVICE_NAME: "dispute-service"
    DOCKERFILE_PATH: "dispute-service/Dockerfile"

include:
  - component: gitlab.com/google-gitlab-components/artifact-registry/upload-artifact-registry@0.1.0
    inputs:
      stage: push-ar
      source: $CI_REGISTRY_IMAGE/eureka-server:$IMAGE_TAG
      target: $AR_BASE/eureka-server:$IMAGE_TAG
    rules:
      - if: '$CI_COMMIT_BRANCH == "main"'
  - component: gitlab.com/google-gitlab-components/artifact-registry/upload-artifact-registry@0.1.0
    inputs:
      stage: push-ar
      source: $CI_REGISTRY_IMAGE/api-gateway:$IMAGE_TAG
      target: $AR_BASE/api-gateway:$IMAGE_TAG
    rules:
      - if: '$CI_COMMIT_BRANCH == "main"'
  - component: gitlab.com/google-gitlab-components/artifact-registry/upload-artifact-registry@0.1.0
    inputs:
      stage: push-ar
      source: $CI_REGISTRY_IMAGE/user-service:$IMAGE_TAG
      target: $AR_BASE/user-service:$IMAGE_TAG
    rules:
      - if: '$CI_COMMIT_BRANCH == "main"'
  - component: gitlab.com/google-gitlab-components/artifact-registry/upload-artifact-registry@0.1.0
    inputs:
      stage: push-ar
      source: $CI_REGISTRY_IMAGE/car-service:$IMAGE_TAG
      target: $AR_BASE/car-service:$IMAGE_TAG
    rules:
      - if: '$CI_COMMIT_BRANCH == "main"'
  - component: gitlab.com/google-gitlab-components/artifact-registry/upload-artifact-registry@0.1.0
    inputs:
      stage: push-ar
      source: $CI_REGISTRY_IMAGE/booking-service:$IMAGE_TAG
      target: $AR_BASE/booking-service:$IMAGE_TAG
    rules:
      - if: '$CI_COMMIT_BRANCH == "main"'
  - component: gitlab.com/google-gitlab-components/artifact-registry/upload-artifact-registry@0.1.0
    inputs:
      stage: push-ar
      source: $CI_REGISTRY_IMAGE/dispute-service:$IMAGE_TAG
      target: $AR_BASE/dispute-service:$IMAGE_TAG
    rules:
      - if: '$CI_COMMIT_BRANCH == "main"'

deploy:cloud-run:
  stage: deploy
  image:
    name: hashicorp/terraform:1.6.6
    entrypoint: [""]
  before_script:
    - cd $TF_DIR
    - terraform init
  script:
    - >
      terraform apply -auto-approve
      -var="project_id=$PROJECT"
      -var="region=$LOCATION"
      -var="repo=$REPOSITORY"
      -var="image_tag=$IMAGE_TAG"
      -var="db_url=$DB_URL"
      -var="db_user=$DB_USERNAME"
      -var="db_password=$DB_PASSWORD"
      -var="jwt_secret=$JWT_SECRET"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'