stages:
  - build_and_push
  - deploy

variables:
  ECR_BASE_URL: "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"

.build_template: &build_definition
  stage: build_and_push
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_BASE_URL
  script:
    - IMAGE_TAG="$ECR_BASE_URL/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA"
    - echo "Building image: $IMAGE_TAG"
    - docker build -f $DOCKERFILE_PATH -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - $DOCKERFILE_PATH
        - pom.xml
        - "${SERVICE_NAME}/pom.xml"
        - "${SERVICE_NAME}/src/**/*"

build_eureka-server:
  <<: *build_definition
  variables:
    SERVICE_NAME: "eureka-server"
    DOCKERFILE_PATH: "eureka-server/Dockerfile"

build_api-gateway:
  <<: *build_definition
  variables:
    SERVICE_NAME: "api-gateway"
    DOCKERFILE_PATH: "api-gateway/Dockerfile"

build_user-service:
  <<: *build_definition
  variables:
    SERVICE_NAME: "user-service"
    DOCKERFILE_PATH: "user-service/Dockerfile"

build_car-service:
  <<: *build_definition
  variables:
    SERVICE_NAME: "car-service"
    DOCKERFILE_PATH: "car-service/Dockerfile"

build_booking-service:
  <<: *build_definition
  variables:
    SERVICE_NAME: "booking-service"
    DOCKERFILE_PATH: "booking-service/Dockerfile"

build_dispute-service:
  <<: *build_definition
  variables:
    SERVICE_NAME: "dispute-service"
    DOCKERFILE_PATH: "dispute-service/Dockerfile"

deploy_to_aws:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - cd terraform
    - terraform init
    - terraform validate
    - terraform apply -auto-approve -var="image_tag=${CI_COMMIT_SHORT_SHA}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'