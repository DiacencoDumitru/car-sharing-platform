server:
  port: 8085

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2s
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      observation:
        enabled: true
      routes:
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
        - id: car-service-route
          uri: lb://car-service
          predicates:
            - Path=/api/v1/cars/**
        - id: booking-service-route
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/**
        - id: dispute-service-route
          uri: lb://dispute-service
          predicates:
            - Path=/api/v1/disputes/**

application:
  security:
    jwt:
      secret-key: NDM0YjVmNjM1MTY0NWE3NDc3Mzg3YTMzNjE1MTQxNTg0NTUxNDg0ZjU0N2IzYjRmNmE1YjdhNmE0ZDQxNjM1Mg==
      expiration: 3600000
  cache:
    response:
      enabled: true
      default-ttl: 30s
      max-body-size-bytes: 262144
      cacheable-paths:
        - /api/v1/cars/**
        - /api/v1/bookings/**
        - /api/v1/users/me
        - /api/v1/users/*/favorite-cars
        - /api/v1/users/me/favorite-cars
      invalidation:
        cars:
          - /api/v1/cars/**
        bookings:
          - /api/v1/bookings/**
        favorite-cars:
          - /api/v1/users/*/favorite-cars/**
          - /api/v1/users/me/favorite-cars/**
        profile:
          - /api/v1/profile/me
          - /api/v1/users/me
        transactions:
          - /api/v1/bookings/*/payment
          - /api/v1/admin/payments/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: api-gateway
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: B3
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
