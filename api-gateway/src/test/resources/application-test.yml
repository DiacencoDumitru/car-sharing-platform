server:
  port: 0

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway-test
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: users-route
          uri: ${test.downstream.base-url}
          predicates:
            - Path=/api/v1/users/**,/api/v1/profile/me
        - id: cars-route
          uri: ${test.downstream.base-url}
          predicates:
            - Path=/api/v1/cars/**
        - id: bookings-route
          uri: ${test.downstream.base-url}
          predicates:
            - Path=/api/v1/bookings/**,/api/v1/admin/**
  data:
    redis:
      host: ${test.redis.host}
      port: ${test.redis.port}

application:
  cache:
    response:
      enabled: true
      default-ttl: 120s
      max-body-size-bytes: 262144
      cacheable-paths:
        - /api/v1/cars/**
        - /api/v1/bookings/**
        - /api/v1/users/me
        - /api/v1/users/*/favorite-cars
        - /api/v1/users/me/favorite-cars
      invalidation:
        cars:
          - /api/v1/cars/**
        bookings:
          - /api/v1/bookings/**
        favorite-cars:
          - /api/v1/users/*/favorite-cars/**
          - /api/v1/users/me/favorite-cars/**
        profile:
          - /api/v1/profile/me
          - /api/v1/users/me
        transactions:
          - /api/v1/bookings/*/payment
          - /api/v1/admin/payments/**

eureka:
  client:
    enabled: false
