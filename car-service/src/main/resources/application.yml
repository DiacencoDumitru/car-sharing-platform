server:
  port: 8081
  error:
    include-message: ALWAYS
    include-binding-errors: ALWAYS
    include-exception: true
    include-stacktrace: ALWAYS

spring:
  application:
    name: car-service
  profiles:
    active: jpa
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  cache:
    type: redis
    cache-names:
      - carById
      - carReviewsByCarId
      - locationById
      - allLocations
    redis:
      time-to-live: 5m
      use-key-prefix: true
      key-prefix: "car-service::"
      cache-null-values: false

  datasource:
    url: jdbc:postgresql://dynamiccarsharing_db:5432/dynamic_car_sharing_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
    eureka-connection-idle-timeout-seconds: 40

  instance:
    instance-id: ${spring.application.name}:${server.port}:${random.uuid}
    prefer-ip-address: false
    hostname: car-service
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

  cloud:
    loadbalancer:
      enabled: true
      retry:
        enabled: true
      eager-load:
        clients: user-service
    discovery:
      client:
        retry:
          enabled: true
          initial-interval: 2000
          max-interval: 8000
          multiplier: 1.5
          max-attempts: 10

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,caches"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: B3
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    com.dynamiccarsharing: DEBUG
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
    org.springframework.cloud.client.discovery: DEBUG

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:E0nD6k7s3yq0s5jD8L3Qw3N8jH2rVg7w1vYJ3p6xKf0U=}
      expiration: 3600000