services:
  db:
    image: postgres:15-alpine
    container_name: dynamiccarsharing_db
    environment:
      - POSTGRES_DB=dynamic_car_sharing_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dynamic_car_sharing_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1000", "--loglevel", "warning"]
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    networks:
      - microservices-network
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CFG_MIN_INSYNC_REPLICAS=1
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  eureka-server:
    build:
      context: .
      dockerfile: services/eureka-server/Dockerfile
    image: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: api-gateway
    container_name: api-gateway
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    environment:
      - MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED=true
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health/liveness || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  user-service-1:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    image: user-service
    container_name: user-service-1
    ports:
      - "8080:8080"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=user-service-1
      - MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/liveness || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  user-service-2:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    image: user-service
    container_name: user-service-2
    ports:
      - "8088:8080"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=user-service-2
      - MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/liveness || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  car-service:
    build:
      context: .
      dockerfile: services/car-service/Dockerfile
    image: car-service
    container_name: car-service
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=local-docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/dynamic_car_sharing_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password123
      - MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED=true
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APPLICATION_MESSAGING_KAFKA_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=E0nD6k7s3yq0s5jD8L3Qw3N8jH2rVg7w1vYJ3p6xKf0U=
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health/liveness || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    image: booking-service
    container_name: booking-service
    ports:
      - "8082:8082"
    environment:
      - MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APPLICATION_MESSAGING_KAFKA_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health/liveness || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    image: notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      - MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED=true
      - SPRING_PROFILES_ACTIVE=local-docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/dynamic_car_sharing_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health/liveness || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  dispute-service:
    build:
      context: .
      dockerfile: services/dispute-service/Dockerfile
    image: dispute-service
    container_name: dispute-service
    ports:
      - "8083:8083"
    environment:
      - MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health/liveness || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: logstash
    ports:
      - "5044:5044"
    volumes:
      - ./infrastructure/logstash/pipeline:/usr/share/logstash/pipeline/
    depends_on:
      - elasticsearch
    networks:
      - microservices-network
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - microservices-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus:/etc/prometheus/
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - microservices-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - microservices-network
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - microservices-network
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:
  grafana_data:

networks:
  microservices-network:
    driver: bridge
