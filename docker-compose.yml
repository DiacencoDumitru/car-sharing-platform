services:
  dynamiccarsharing_db:
    container_name: DynamicCarsSharing_db
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./src/test/resources/schema.sql:/docker-entrypoint-initdb.d/initdb.sql

  app:
    container_name: dynamiccarsharing_app
    build: .
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - dynamiccarsharing_db
    environment:
      SPRING_PROFILES_ACTIVE: dev

      DATABASE_URL: jdbc:postgresql://dynamiccarsharing_db:5432/${DB_NAME}
      DATABASE_USER: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}

  pgadmin:
    container_name: pgadmin4_container
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGA_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGA_PASSWORD}
    ports:
      - "${PGA_PORT}:80"
    depends_on:
      - dynamiccarsharing_db
volumes:
  db_data:
    name: db_data