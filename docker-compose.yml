services:
  dynamiccarsharing_db:
    container_name: DynamicCarsSharing_db
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  user-service:
    container_name: user-service-app
    build: ./user-service
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - dynamiccarsharing_db
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}

  car-service:
    container_name: car-service-app
    build: ./car-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - dynamiccarsharing_db
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SERVICE_USER_URL=http://user-service:8080/api/users

  booking-service:
    container_name: booking-service-app
    build: ./booking-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - dynamiccarsharing_db
      - user-service
      - car-service
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SERVICE_USER_URL=http://user-service:8080/api/users
      - SERVICE_CAR_URL=http://car-service:8081/api/cars

  dispute-service:
    container_name: dispute-service-app
    build: ./dispute-service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - dynamiccarsharing_db
      - user-service
      - booking-service
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SERVICE_USER_URL=http://user-service:8080/api/users
      - SERVICE_BOOKING_URL=http://booking-service:8082/api/bookings

volumes:
  db_data:
    name: db_data