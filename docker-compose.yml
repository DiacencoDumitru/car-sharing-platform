services:
  db:
    image: postgres:15-alpine
    container_name: dynamiccarsharing_db
    environment:
      POSTGRES_DB: dynamic_car_sharing_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dynamic_car_sharing_db -h localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    image: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: api-gateway
    container_name: api-gateway
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  user-service-1:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: user-service
    container_name: user-service-1
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/dynamic_car_sharing_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=user-service-1
      - SPRING_APPLICATION_NAME=user-service
      - SPRING_PROFILES_ACTIVE=jpa,lb-random
      - DB_USERNAME=postgres
      - DB_PASSWORD=password123
    depends_on:
      - db
      - eureka-server
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  user-service-2:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: user-service
    container_name: user-service-2
    ports:
      - "8088:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/dynamic_car_sharing_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=user-service-2
      - SPRING_APPLICATION_NAME=user-service
      - SPRING_PROFILES_ACTIVE=jpa,lb-random
      - DB_USERNAME=postgres
      - DB_PASSWORD=password123
    depends_on:
      - db
      - eureka-server
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  car-service:
    build:
      context: .
      dockerfile: car-service/Dockerfile
    image: car-service
    container_name: car-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/dynamic_car_sharing_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=car-service
      - SPRING_APPLICATION_NAME=car-service
      - SPRING_PROFILES_ACTIVE=jpa,lb-random
      - DB_USERNAME=postgres
      - DB_PASSWORD=password123
    depends_on:
      - db
      - eureka-server
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    image: booking-service
    container_name: booking-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/dynamic_car_sharing_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=booking-service
      - SPRING_APPLICATION_NAME=booking-service
      - SPRING_PROFILES_ACTIVE=jpa,lb-random
      - DB_USERNAME=postgres
      - DB_PASSWORD=password123
    depends_on:
      - db
      - eureka-server
      - user-service-1
      - user-service-2
      - car-service
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  dispute-service:
    build:
      context: .
      dockerfile: dispute-service/Dockerfile
    image: dispute-service
    container_name: dispute-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/dynamic_car_sharing_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=dispute-service
      - SPRING_APPLICATION_NAME=dispute-service
      - SPRING_PROFILES_ACTIVE=jpa,lb-random
      - DB_USERNAME=postgres
      - DB_PASSWORD=password123
    depends_on:
      - db
      - eureka-server
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  microservices-network:
    driver: bridge
    name: microservices-network