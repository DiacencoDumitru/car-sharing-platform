services:
  eureka-server:
    container_name: eureka-server
    build:
      context: .
      dockerfile: ./eureka-server/Dockerfile
    ports:
      - "8761:8761"
    networks:
      - micro-net

  dynamiccarsharing_db:
    container_name: DynamicCarsSharing_db
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - micro-net

  user-service:
    # REMOVED container_name to allow scaling
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    restart: always
    ports:
      - "8080-8089:8080"  # Port range for multiple instances
    depends_on:
      - eureka-server
      - dynamiccarsharing_db
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_APPLICATION_NAME=user-service
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - micro-net

  car-service:
    container_name: car-service-app
    build:
      context: .
      dockerfile: ./car-service/Dockerfile
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - dynamiccarsharing_db
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_APPLICATION_NAME=car-service
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - micro-net

  booking-service:
    container_name: booking-service-app
    build:
      context: .
      dockerfile: ./booking-service/Dockerfile
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - dynamiccarsharing_db
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_APPLICATION_NAME=booking-service
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - micro-net

  dispute-service:
    container_name: dispute-service-app
    build:
      context: .
      dockerfile: ./dispute-service/Dockerfile
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - dynamiccarsharing_db
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://dynamiccarsharing_db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_APPLICATION_NAME=dispute-service
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - micro-net

volumes:
  db_data:
    name: db_data

networks:
  micro-net:
    driver: bridge