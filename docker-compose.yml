services:
  db:
    image: postgres:15-alpine
    container_name: dynamiccarsharing_db
    environment:
      - POSTGRES_DB=dynamic_car_sharing_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dynamic_car_sharing_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    image: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: api-gateway
    container_name: api-gateway
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  user-service-1:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: user-service
    container_name: user-service-1
    ports:
      - "8080:8080"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=user-service-1
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  user-service-2:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: user-service
    container_name: user-service-2
    ports:
      - "8088:8080"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=user-service-2
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  car-service:
    build:
      context: .
      dockerfile: car-service/Dockerfile
    image: car-service
    container_name: car-service
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    image: booking-service
    container_name: booking-service
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  dispute-service:
    build:
      context: .
      dockerfile: dispute-service/Dockerfile
    image: dispute-service
    container_name: dispute-service
    ports:
      - "8083:8083"
    depends_on:
      db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      logstash:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - microservices-network
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: logstash
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline/
    depends_on:
      - elasticsearch
    networks:
      - microservices-network
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - microservices-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus/
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - microservices-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - microservices-network
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - microservices-network
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:
  grafana_data:

networks:
  microservices-network:
    driver: bridge