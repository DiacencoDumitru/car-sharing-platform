spring.datasource.url=jdbc:h2:mem:integration;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
eureka.client.enabled=false

# Для интеграционных тестов доменной логики Kafka не нужен.
# Важно: Spring Boot может автоматически исключать KafkaAnnotationDrivenConfiguration при auto-startup=false,
# что в нашем окружении приводит к ошибке invalid excludes. Поэтому оставляем auto-startup включенным,
# но настраиваем consumer десериализацию (StringDeserializer) ниже.
spring.kafka.listener.auto-startup=true

# Для интеграционных тестов доменной логики Kafka не используется, но Spring Kafka инфраструктура
# всё равно создаёт consumer'ы. Чтобы не падать на JsonDeserializer конфликте конфигурации,
# принудительно используем StringDeserializer и отключаем trusted-packages в конфиге.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=

