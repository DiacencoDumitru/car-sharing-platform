openapi: 3.0.3
info:
  title: Dynamic Car Sharing API
  description: |-
    A comprehensive API for a peer-to-peer car sharing platform.
    This API covers all functionalities for renters, car owners, and administrators,
    from Browse and booking cars to managing disputes and verifying users.
  version: 1.0.0
servers:
  - url: /api/v1
    description: API Version 1
tags:
  - name: Cars
    description: Public Browse and management of cars.
  - name: Bookings
    description: Operations for renters to book cars and for owners to manage requests.
  - name: Users & Profiles
    description: User account management, profiles, and reviews.
  - name: Reviews
    description: Managing user and car reviews.
  - name: Payments & Transactions
    description: Endpoints for handling payments and viewing transaction history.
  - name: Disputes
    description: Endpoints for raising and resolving disputes.
  - name: Admin
    description: Administrative endpoints for platform management.

paths:
  /cars:
    get:
      tags:
        - Cars
      summary: Browse and filter available cars
      description: Allows guests and renters to browse available cars with extensive filtering.
      operationId: searchCars
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: make
          in: query
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: locationId
          in: query
          schema:
            type: integer
            format: int64
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/CarType'
        - name: minPrice
          in: query
          schema:
            type: number
            format: double
        - name: maxPrice
          in: query
          schema:
            type: number
            format: double
        - name: verificationStatus
          in: query
          schema:
            $ref: '#/components/schemas/VerificationStatus'
        - name: ownerId
          in: query
          description: When set, returns only cars listed by this owner user id.
          schema:
            type: integer
            format: int64
        - name: statusIn
          in: query
          description: Optional list of car statuses to include.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/CarStatus'
        - name: minAverageRating
          in: query
          description: When set, returns only cars that have a non-null average review rating greater than or equal to this value.
          schema:
            type: number
            format: double
        - name: minReviewCount
          in: query
          description: When set, returns only cars whose stored review count is greater than or equal to this integer (cars with no count are treated as zero).
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: A paginated list of available cars.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarPage'

  /cars/search:
    get:
      tags:
        - Cars
      summary: Elasticsearch search for cars
      description: >-
        Full-text and structured search over indexed car listings.
        Supports optional text query q plus the same structured filters as browse.
      operationId: searchCarsElasticsearch
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: q
          in: query
          description: Optional full-text query over make, model, registration number and location fields.
          required: false
          schema:
            type: string
        - name: make
          in: query
          required: false
          schema:
            type: string
        - name: model
          in: query
          required: false
          schema:
            type: string
        - name: ownerId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: locationId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CarType'
        - name: verificationStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/VerificationStatus'
        - name: statusIn
          in: query
          required: false
          description: Optional list of statuses to include in search results.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/CarStatus'
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: minAverageRating
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: minReviewCount
          in: query
          required: false
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: A paginated list of cars from Elasticsearch search.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarPage'
    post:
      tags:
        - Cars
      summary: List a new car
      description: Allows a car owner to list a new car on the platform.
      operationId: createCar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarCreateRequest'
      responses:
        '201':
          description: Car created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
        '400':
          $ref: '#/components/responses/BadRequest'

  /cars/{carId}:
    get:
      tags:
        - Cars
      summary: Get car details by ID
      description: Retrieves the details of a specific car.
      operationId: getCarById
      parameters:
        - $ref: '#/components/parameters/CarId'
      responses:
        '200':
          description: Detailed information for a single car.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Cars
      summary: Update car details
      description: Allows a car owner to update their car's details.
      operationId: updateCar
      parameters:
        - $ref: '#/components/parameters/CarId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarUpdateRequest'
      responses:
        '200':
          description: Car updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Cars
      summary: Delete a car
      description: Allows a car owner or admin to delete a car listing.
      operationId: deleteCar
      parameters:
        - $ref: '#/components/parameters/CarId'
      responses:
        '204':
          description: "Car deleted successfully."
        '404':
          $ref: '#/components/responses/NotFound'

  /cars/{carId}/similar:
    get:
      tags:
        - Cars
      summary: Similar car listings
      description: >-
        Returns Elasticsearch-backed listings similar to the given car: same car type and make,
        price per day within a configurable band around the anchor car (default ±25%),
        status AVAILABLE and verification VERIFIED. The anchor car id is never included.
      operationId: getSimilarCars
      parameters:
        - $ref: '#/components/parameters/CarId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated list of similar cars.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarPage'
        '404':
          $ref: '#/components/responses/NotFound'

  /bookings:
    get:
      tags:
        - Bookings
      summary: List all bookings (Admin)
      description: Retrieves a paginated list of all bookings on the platform. For admin use.
      operationId: getAllBookings
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A paginated list of all bookings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingPage'
    post:
      tags:
        - Bookings
      summary: Book a car
      description: Allows a renter to book a car for a specific time period.
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: "Booking request created."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequest'

  /bookings/quote:
    post:
      tags:
        - Bookings
      summary: Get booking quote
      description: Calculates estimated booking price before creating a booking.
      operationId: getBookingQuote
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Optional key to return the same quote response for repeated retries.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '200':
          description: Quote calculated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /bookings/waitlist:
    post:
      tags:
        - Bookings
      summary: Join booking waitlist
      description: Adds renter to waitlist for an already occupied car time range.
      operationId: joinBookingWaitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingWaitlistCreateRequest'
      responses:
        '201':
          description: Waitlist entry created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingWaitlistEntry'
        '400':
          $ref: '#/components/responses/BadRequest'

  /bookings/waitlist/{waitlistId}:
    get:
      tags:
        - Bookings
      summary: Get active waitlist entry
      operationId: getBookingWaitlistEntry
      parameters:
        - name: waitlistId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Active waitlist entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingWaitlistEntry'
        '400':
          $ref: '#/components/responses/BadRequest'

  /bookings/waitlist/{waitlistId}/cancel:
    patch:
      tags:
        - Bookings
      summary: Cancel waitlist entry
      operationId: cancelBookingWaitlistEntry
      parameters:
        - name: waitlistId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Waitlist entry canceled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingWaitlistEntry'
        '400':
          $ref: '#/components/responses/BadRequest'

  /bookings/availability:
    get:
      tags:
        - Bookings
      summary: Check car availability for a time range
      description: Returns whether the car can be booked for the given interval without creating a reservation. Uses the same rules as booking creation for car status and overlapping PENDING or APPROVED bookings.
      operationId: checkCarAvailability
      parameters:
        - name: carId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: startTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Availability result; HTTP 400 if the time range is invalid or the car cannot be resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarAvailabilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /bookings/availability/calendar:
    get:
      tags:
        - Bookings
      summary: Get daily car availability calendar
      description: Returns per-day availability for a single car in the provided time range. Each day is marked as available or unavailable with a reason.
      operationId: getCarAvailabilityCalendar
      parameters:
        - name: carId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: startTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Daily availability calendar for the requested car and interval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarAvailabilityCalendarResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /bookings/{bookingId}:
    get:
      tags:
        - Bookings
      summary: Get booking details
      description: Retrieves details of a specific booking.
      operationId: getBookingById
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Detailed information for the booking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Bookings
      summary: Update booking status
      description: Allows a car owner or renter to update the booking status (e.g., APPROVE, CANCEL).
      operationId: updateBookingStatus
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/TransactionStatus'
      responses:
        '200':
          description: "Booking status updated."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags:
        - Bookings
      summary: Delete a booking (Admin)
      description: Allows an admin to delete a booking record.
      operationId: deleteBooking
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '204':
          description: "Booking deleted successfully."
        '404':
          $ref: '#/components/responses/NotFound'

  /bookings/{bookingId}/summary:
    get:
      tags:
        - Bookings
      summary: Get booking summary with payment and transactions
      description: Returns booking details together with the linked payment (if any) and all transactions for that booking in one response.
      operationId: getBookingSummary
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Aggregated booking, optional payment, and transactions for the booking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSummary'
        '204':
          description: No booking exists for the given identifier.

  /bookings/{bookingId}/messages:
    post:
      tags:
        - Bookings
      summary: Post in-app booking message
      description: |-
        Renter or car owner posts a message on a booking thread. Requires header X-User-Id matching the renter or the car owner.
        Phone numbers are not exposed in this API; use this thread until the booking is confirmed off-platform policies apply.
      operationId: postBookingMessage
      parameters:
        - $ref: '#/components/parameters/BookingId'
        - name: X-User-Id
          in: header
          required: true
          description: Authenticated user id of the sender; must be the renter or the car owner.
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingMessageCreateRequest'
      responses:
        '201':
          description: Message stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Caller is not a participant of the booking.
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags:
        - Bookings
      summary: List booking messages after cursor
      description: |-
        Returns up to 100 messages with id greater than afterId for long polling clients. Requires X-User-Id for the renter or owner.
      operationId: listBookingMessages
      parameters:
        - $ref: '#/components/parameters/BookingId'
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
        - name: afterId
          in: query
          required: false
          description: Return messages strictly after this id; use 0 for the first page.
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '200':
          description: Ordered messages oldest-first within the page.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookingMessageResponse'
        '403':
          description: Caller is not a participant of the booking.
        '404':
          $ref: '#/components/responses/NotFound'

  /users:
    get:
      tags:
        - Users & Profiles
      summary: List all users (Admin)
      description: Retrieves a paginated list of all users.
      operationId: getAllUsers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A paginated list of users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'

  /users/register:
    post:
      tags:
        - Users & Profiles
      summary: Register a new user
      description: Allows a guest to sign up for a new account.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: "User account created."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{userId}:
    get:
      tags:
        - Users & Profiles
      summary: Get user's public profile
      description: View a user's public profile, including their reviews.
      operationId: getUserProfileById
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: "User's public profile."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicProfile'
    delete:
      tags:
        - Users & Profiles
      summary: Delete a user (Admin)
      description: Allows an admin to permanently delete a user account.
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: "User deleted successfully."
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me:
    get:
      tags:
        - Users & Profiles
      summary: Get current user's profile
      description: "Retrieves the full profile for the authenticated user."
      operationId: getCurrentUserProfile
      responses:
        '200':
          description: "Authenticated user's profile."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      tags:
        - Users & Profiles
      summary: Update current user's contact info
      description: Allows a user to update their contact information.
      operationId: updateCurrentUserContactInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInfo'
      responses:
        '200':
          description: "Contact info updated."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{userId}/favorite-cars:
    get:
      tags:
        - Users & Profiles
      summary: List favorite car IDs
      description: Returns car IDs the user saved for quick access (wishlist). Only the authenticated user may read their own list.
      operationId: listUserFavoriteCars
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Ordered list of favorite car identifiers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteCarsResponse'
        '403':
          description: Caller is not allowed to read this user's favorites.
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/favorite-cars/{carId}:
    put:
      tags:
        - Users & Profiles
      summary: Add car to favorites
      description: Idempotent; verifies the car exists via car-service before saving.
      operationId: addUserFavoriteCar
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CarId'
      responses:
        '204':
          description: Favorite saved (or already present).
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Caller is not allowed to modify this user's favorites.
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Car service unavailable.
    delete:
      tags:
        - Users & Profiles
      summary: Remove car from favorites
      description: Idempotent; no error if the favorite was not present.
      operationId: removeUserFavoriteCar
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CarId'
      responses:
        '204':
          description: Favorite removed if it existed.
        '403':
          description: Caller is not allowed to modify this user's favorites.
        '404':
          $ref: '#/components/responses/NotFound'

  /reviews/{reviewId}:
    get:
      tags:
        - Reviews
      summary: Get a specific review by ID
      description: Retrieves a single car or user review by its unique ID.
      operationId: getReviewById
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      responses:
        '200':
          description: "Review details."
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UserReview'
                  - $ref: '#/components/schemas/CarReview'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Reviews
      summary: Update a review
      description: Allows the original author or an admin to edit a review's comment.
      operationId: updateReview
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        '200':
          description: "Review updated."
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Reviews
      summary: Delete a review
      description: Allows the original author or an admin to delete a review.
      operationId: deleteReview
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      responses:
        '204':
          description: "Review deleted."
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/reviews:
    get:
      tags:
        - Reviews
      summary: Get reviews for a user
      description: Retrieves all reviews for a specific user.
      operationId: getUserReviews
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: "A list of reviews for the user."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserReview'
    post:
      tags:
        - Reviews
      summary: Review a user
      description: Allows a user to rate and review another user after a completed trip.
      operationId: createUserReview
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserReviewCreateRequest'
      responses:
        '201':
          description: "Review submitted."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReview'

  /cars/{carId}/reviews:
    get:
      tags:
        - Reviews
      summary: Get reviews for a car
      description: Retrieves all reviews for a specific car.
      operationId: getCarReviews
      parameters:
        - $ref: '#/components/parameters/CarId'
      responses:
        '200':
          description: "A list of reviews for the car."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarReview'
    post:
      tags:
        - Reviews
      summary: Review a car
      description: Allows a renter to review a car after a completed trip.
      operationId: createCarReview
      parameters:
        - $ref: '#/components/parameters/CarId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarReviewCreateRequest'
      responses:
        '201':
          description: "Review submitted."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarReview'

  /cars/{carId}/verification:
    post:
      tags:
        - Cars
      summary: Submit a car for verification
      description: A car owner can submit their car to be verified by an admin.
      operationId: submitCarForVerification
      parameters:
        - $ref: '#/components/parameters/CarId'
      responses:
        '202':
          description: "Verification request accepted."
        '404':
          $ref: '#/components/responses/NotFound'

  /bookings/{bookingId}/payment:
    post:
      tags:
        - Payments & Transactions
      summary: Pay for a booking
      description: Allows a renter to securely pay for an approved booking.
      operationId: payForBooking
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: "Payment successful."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '402':
          description: "Payment Required or Failed."

  /bookings/{bookingId}/dispute:
    post:
      tags:
        - Disputes
      summary: File a dispute for a booking
      description: Allows a renter to file a dispute for a completed booking.
      operationId: createDispute
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeCreateRequest'
      responses:
        '201':
          description: "Dispute filed successfully."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'
        '409':
          description: "A dispute already exists for this booking."

  /users/me/bookings:
    get:
      tags:
        - Bookings
      summary: Get my booking history
      description: Retrieves a paginated list of bookings for the authenticated user.
      operationId: getMyBookings
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: asRole
          in: query
          description: "Filter bookings by user's role (`renter` or `owner`)."
          schema:
            type: string
            enum:
              - renter
              - owner
      responses:
        '200':
          description: "A paginated list of the user's bookings."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingPage'

  /users/me/transactions:
    get:
      tags:
        - Payments & Transactions
      summary: Get my transaction history
      description: "Retrieves a paginated list of all financial transactions for the authenticated user."
      operationId: getMyTransactions
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: "A paginated list of transactions."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionPage'

  /users/me/favorite-cars:
    get:
      tags:
        - Users & Profiles
      summary: List my favorite cars
      description: Returns car IDs the authenticated user saved for quick access when booking. Most recently added first.
      operationId: listMyFavoriteCars
      responses:
        '200':
          description: List of favorited car IDs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteCarIds'
        '403':
          description: Unauthenticated (e.g. missing or invalid bearer token).

  /users/me/favorite-cars/{carId}:
    put:
      tags:
        - Users & Profiles
      summary: Add car to favorites
      description: Idempotent. Adds the car to the user's favorites if not already present. Verifies the car exists via car-service.
      operationId: addFavoriteCar
      parameters:
        - $ref: '#/components/parameters/CarId'
      responses:
        '204':
          description: Favorite saved (or already present).
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Unauthenticated (e.g. missing or invalid bearer token).
        '503':
          description: Car service unavailable.
    delete:
      tags:
        - Users & Profiles
      summary: Remove car from favorites
      description: Idempotent. Removes the car from favorites if present.
      operationId: removeFavoriteCar
      parameters:
        - $ref: '#/components/parameters/CarId'
      responses:
        '204':
          description: Favorite removed (or was not in the list).
        '403':
          description: Unauthenticated (e.g. missing or invalid bearer token).

  /admin/payments:
    get:
      tags:
        - Admin
      summary: List and filter payments
      description: Returns all payments, optionally filtered by booking id, amount, status, and payment method.
      operationId: adminSearchPayments
      parameters:
        - name: bookingId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: amount
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TransactionStatus'
        - name: paymentMethod
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentType'
      responses:
        '200':
          description: A list of payments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'

  /admin/payments/{paymentId}/confirm:
    patch:
      tags:
        - Admin
      summary: Confirm a pending payment
      description: Marks a payment as completed. An audit row is stored; optional acting admin user id may be sent via `X-User-Id` (typically forwarded by API Gateway).
      operationId: adminConfirmPayment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: X-User-Id
          in: header
          required: false
          description: Acting admin user id.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /admin/payments/{paymentId}/refund:
    patch:
      tags:
        - Admin
      summary: Refund a completed payment
      description: Marks a payment as refunded. Loyalty effects for this payment are reversed (earned points removed, redeemed points restored to the renter’s balance). The operation fails with a client error if the loyalty balance cannot be adjusted. An audit row is stored; optional acting admin user id may be sent via `X-User-Id`.
      operationId: adminRefundPayment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: X-User-Id
          in: header
          required: false
          description: Acting admin user id.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment refunded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /admin/transactions:
    get:
      tags:
        - Admin
      summary: List and filter transactions
      description: Returns all transactions, optionally filtered by booking id, status, and payment method.
      operationId: adminSearchTransactions
      parameters:
        - name: bookingId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TransactionStatus'
        - name: paymentMethod
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentType'
      responses:
        '200':
          description: A list of transactions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'

  /admin/cars/{carId}/verification:
    patch:
      tags:
        - Admin
      summary: Verify or reject a car
      description: Allows an admin to approve or reject a car's verification request.
      operationId: setCarVerificationStatus
      parameters:
        - $ref: '#/components/parameters/CarId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/VerificationStatus'
      responses:
        '200':
          description: "Car verification status updated."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'

  /admin/users/{userId}/status:
    patch:
      tags:
        - Admin
      summary: Manage a user's account status
      description: Allows an admin to manage a user's account (e.g., suspend or ban).
      operationId: setUserStatus
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/UserStatus'
      responses:
        '200':
          description: "User status updated."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /admin/disputes:
    get:
      tags:
        - Admin
      summary: List all disputes
      description: Retrieves a paginated list of all disputes for admin review.
      operationId: getAllDisputes
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: "A paginated list of disputes."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputePage'

  /admin/disputes/{disputeId}/resolve:
    patch:
      tags:
        - Admin
      summary: Resolve a dispute
      description: Allows an admin to resolve a dispute between a renter and an owner.
      operationId: resolveDispute
      parameters:
        - $ref: '#/components/parameters/DisputeId'
      responses:
        '200':
          description: "Dispute resolved."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'

components:
  parameters:
    CarId:
      name: carId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    DisputeId:
      name: disputeId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ReviewId:
      name: reviewId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      description: "Page number (0-indexed)"
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      description: "Number of items per page"
      schema:
        type: integer
        default: 20
    Sort:
      name: sort
      in: query
      description: "Sorting criteria: property,(asc|desc)"
      schema:
        type: string
        example: "createdAt,desc"

  responses:
    NotFound:
      description: The specified resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    BadRequest:
      description: Invalid request payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    Car:
      $ref: 'schemas/Car.yaml'
    Booking:
      $ref: 'schemas/Booking.yaml'
    User:
      $ref: 'schemas/User.yaml'
    UserPublicProfile:
      $ref: 'schemas/UserPublicProfile.yaml'
    UserReview:
      $ref: 'schemas/UserReview.yaml'
    CarReview:
      $ref: 'schemas/CarReview.yaml'
    Payment:
      $ref: 'schemas/Payment.yaml'
    Transaction:
      $ref: 'schemas/Transaction.yaml'
    BookingSummary:
      type: object
      required:
        - booking
        - transactions
      properties:
        booking:
          $ref: '#/components/schemas/Booking'
        payment:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Payment'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
    Dispute:
      $ref: 'schemas/Dispute.yaml'
    ContactInfo:
      $ref: 'schemas/ContactInfo.yaml'

    CarCreateRequest:
      $ref: 'schemas/CarCreateRequest.yaml'
    CarUpdateRequest:
      $ref: 'schemas/CarUpdateRequest.yaml'
    BookingCreateRequest:
      $ref: 'schemas/BookingCreateRequest.yaml'
    UserCreateRequest:
      $ref: 'schemas/UserCreateRequest.yaml'
    UserReviewCreateRequest:
      $ref: 'schemas/UserReviewCreateRequest.yaml'
    CarReviewCreateRequest:
      $ref: 'schemas/CarReviewCreateRequest.yaml'
    DisputeCreateRequest:
      $ref: 'schemas/DisputeCreateRequest.yaml'
    PaymentRequest:
      $ref: 'schemas/PaymentRequest.yaml'
    BookingMessageCreateRequest:
      type: object
      required:
        - body
      properties:
        body:
          type: string
          maxLength: 2000
    BookingMessageResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        senderUserId:
          type: integer
          format: int64
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    BookingWaitlistCreateRequest:
      type: object
      required:
        - renterId
        - carId
        - startTime
        - endTime
        - pickupLocationId
      properties:
        renterId:
          type: integer
          format: int64
        carId:
          type: integer
          format: int64
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        pickupLocationId:
          type: integer
          format: int64
        promoCode:
          type: string
    BookingWaitlistEntry:
      type: object
      properties:
        id:
          type: integer
          format: int64
        renterId:
          type: integer
          format: int64
        carId:
          type: integer
          format: int64
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        pickupLocationId:
          type: integer
          format: int64
        promoCode:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - CANCELED
            - PROMOTED
        createdAt:
          type: string
          format: date-time

    QuoteRequest:
      type: object
      required:
        - renterId
        - carId
        - startTime
        - endTime
      properties:
        renterId:
          type: integer
          format: int64
        carId:
          type: integer
          format: int64
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        pickupLocationId:
          type: integer
          format: int64
        promoCode:
          type: string
        loyaltyPointsToUse:
          type: number
          format: double
    QuoteResponse:
      type: object
      properties:
        renterId:
          type: integer
          format: int64
        carId:
          type: integer
          format: int64
        baseAmount:
          type: number
          format: double
        dynamicMarkupAmount:
          type: number
          format: double
        discountAmount:
          type: number
          format: double
        loyaltyAmount:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
        currency:
          type: string
        expiresAt:
          type: string
          format: date-time

    CarAvailabilityResponse:
      type: object
      required:
        - available
      properties:
        available:
          type: boolean
        reason:
          type: string
          enum:
            - CAR_NOT_AVAILABLE
            - SLOT_TAKEN
          description: Present when available is false.

    CarAvailabilityCalendarDay:
      type: object
      required:
        - date
        - available
      properties:
        date:
          type: string
          format: date
        available:
          type: boolean
        reason:
          type: string
          enum:
            - CAR_NOT_AVAILABLE
            - SLOT_TAKEN

    CarAvailabilityCalendarResponse:
      type: object
      required:
        - carId
        - days
      properties:
        carId:
          type: integer
          format: int64
        days:
          type: array
          items:
            $ref: '#/components/schemas/CarAvailabilityCalendarDay'

    FavoriteCarsResponse:
      type: object
      required:
        - carIds
      properties:
        carIds:
          type: array
          items:
            type: integer
            format: int64

    CarPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Car'
        totalPages:
          type: integer
        totalElements:
          type: integer
    BookingPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
        totalPages:
          type: integer
        totalElements:
          type: integer
    TransactionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        totalPages:
          type: integer
        totalElements:
          type: integer
    FavoriteCarIds:
      type: array
      description: Car IDs saved as favorites by the user; most recently added first.
      items:
        type: integer
        format: int64
    DisputePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Dispute'
        totalPages:
          type: integer
        totalElements:
          type: integer
    UserPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/User'
        totalPages:
          type: integer
        totalElements:
          type: integer

    CarType:
      type: string
      enum: [ SEDAN, SUV, HATCHBACK, COUPE, TRUCK ]
    CarStatus:
      type: string
      enum: [ AVAILABLE, RENTED, MAINTENANCE ]
    TransactionStatus:
      type: string
      enum: [ PENDING, APPROVED, COMPLETED, CANCELED, REFUNDED ]
    VerificationStatus:
      type: string
      enum: [ PENDING, VERIFIED, REJECTED ]
    DisputeStatus:
      type: string
      enum: [ OPEN, RESOLVED ]
    UserStatus:
      type: string
      enum: [ ACTIVE, SUSPENDED, BANNED ]
    UserRole:
      type: string
      enum: [ RENTER, CAR_OWNER, ADMIN, GUEST ]
    PaymentType:
      type: string
      enum: [ CREDIT_CARD, DEBIT_CARD, PAYPAL, APPLE_PAY, GOOGLE_PAY, BANK_TRANSFER, CASH, CRYPTO, MOBILE_MONEY ]

    ApiError:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string