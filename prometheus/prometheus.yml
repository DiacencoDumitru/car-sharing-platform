global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-micrometer'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets:
          - 'api-gateway:8085'
          - 'user-service-1:8080'
          - 'user-service-2:8080'
          - 'car-service:8081'
          - 'booking-service:8082'
          - 'dispute-service:8083'