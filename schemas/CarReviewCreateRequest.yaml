type: object
required:
  - reviewerId
  - bookingId
  - rating
  - comment
properties:
  reviewerId:
    type: integer
    format: int64
  bookingId:
    type: integer
    format: int64
  rating:
    type: integer
    minimum: 1
    maximum: 5
  comment:
    type: string
    minLength: 10
    maxLength: 1000
