server:
  port: 8082

spring:
  application:
    name: booking-service
  profiles:
    active: jpa
  datasource:
    url: jdbc:postgresql://dynamiccarsharing_db:5432/dynamic_car_sharing_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    client-id: ${spring.application.name}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cache:
    redis:
      key-prefix: ${application.redis.key-prefix:booking}
      time-to-live: 5m

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10

  instance:
    instance-id: ${spring.application.name}:${server.port}:${random.uuid}
    prefer-ip-address: false
    hostname: booking-service
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

  cloud:
    loadbalancer:
      enabled: true
      retry:
        enabled: true

logging:
  level:
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
    org.springframework.cloud.client.discovery: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: B3
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  server:
    port: ${server.port}

application:
  http:
    clients:
      timeout-seconds: 3
      retry-max-attempts: 2
      retry-backoff-millis: 200
      internal-api-key: ${USER_SERVICE_INTERNAL_API_KEY:}
  reminders:
    enabled: false
    hours-before-start: 24
    hours-before-end: 2
    scan-window-minutes: 15
    scan-interval-ms: 900000
  messaging:
    kafka:
      enabled: false
    topics:
      booking-commands: booking.commands
      booking-reminders: booking.reminders
    outbox:
      relay-interval-ms: 1000
      batch-size: 50
      send-timeout-seconds: 10
  redis:
    key-prefix: booking
    read-cache:
      enabled: false
    booking-guard:
      enabled: false
      lock-ttl-seconds: 10
      wait-timeout-millis: 1500
      retry-delay-millis: 50
    idempotency:
      enabled: false
      response-ttl-seconds: 86400
      lock-ttl-seconds: 15
      wait-timeout-millis: 2500
      poll-delay-millis: 30