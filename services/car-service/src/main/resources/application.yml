server:
  port: 8081
  error:
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:never}
    include-binding-errors: ${SERVER_ERROR_INCLUDE_BINDING_ERRORS:never}
    include-exception: ${SERVER_ERROR_INCLUDE_EXCEPTION:false}
    include-stacktrace: ${SERVER_ERROR_INCLUDE_STACKTRACE:never}

spring:
  application:
    name: car-service
  profiles:
    active: jpa,es
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  cache:
    type: redis
    cache-names:
      - carById
      - carReviewsByCarId
      - locationById
      - allLocations
    redis:
      time-to-live: 5m
      use-key-prefix: true
      key-prefix: "car-service::"
      cache-null-values: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    client-id: ${spring.application.name}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: car-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.dynamiccarsharing.*"
    listener:
      ack-mode: record
      missing-topics-fatal: false

  datasource:
    url: jdbc:postgresql://dynamiccarsharing_db:5432/dynamic_car_sharing_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}
    connection-timeout: 2s
    socket-timeout: 5s

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
    eureka-connection-idle-timeout-seconds: 40

  instance:
    instance-id: ${spring.application.name}:${server.port}:${random.uuid}
    prefer-ip-address: false
    hostname: car-service
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

  cloud:
    loadbalancer:
      enabled: true
      retry:
        enabled: true
      eager-load:
        clients: user-service
    discovery:
      client:
        retry:
          enabled: true
          initial-interval: 2000
          max-interval: 8000
          multiplier: 1.5
          max-attempts: 10

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus,caches,circuitbreakers,circuitbreakerevents,retries,retryevents"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: B3
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    com.dynamiccarsharing: DEBUG
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
    org.springframework.cloud.client.discovery: DEBUG

application:
  http:
    clients:
      timeout-seconds: 3
      retry-max-attempts: 2
      retry-backoff-millis: 200
      internal-api-key: ${USER_SERVICE_INTERNAL_API_KEY:}
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION_MS:3600000}
  search:
    index-name: cars
    indexing-enabled: true
    similar-price-band-fraction: 0.25
  messaging:
    topics:
      car-events: car.events
      car-commands: car.commands
      car-commands-dlt: car.commands.dlt
      booking-commands: booking.commands
      booking-commands-dlt: booking.commands.dlt

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        registerHealthIndicator: true
    instances:
      carSearch:
        baseConfig: default
      carEvents:
        baseConfig: default

  retry:
    instances:
      carSearch:
        maxAttempts: 3
        waitDuration: 200ms
      carEvents:
        maxAttempts: 5
        waitDuration: 100ms
