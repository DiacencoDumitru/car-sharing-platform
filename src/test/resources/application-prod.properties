spring.datasource.url=${DATABASE_URL:jdbc:postgresql://prod-db-host:5432/prod_db}
spring.datasource.username=${DATABASE_USER:prod_user}
spring.datasource.password=${DATABASE_PASSWORD:prod_secret}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.com.dynamiccarsharing=INFO
logging.level.org.springframework.jdbc=INFO